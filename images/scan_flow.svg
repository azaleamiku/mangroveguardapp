<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mangrove Guard Scan Flow</title>
  <desc id="desc">Static flow diagram showing scanner capture, model inference, stability calculation, local save, dashboard update, and PDF export.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#052A2A" />
      <stop offset="100%" stop-color="#0A1E2B" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0E3A43" />
      <stop offset="100%" stop-color="#12505D" />
    </linearGradient>
    <style>
      .label { font: 600 22px 'Segoe UI', Roboto, Arial, sans-serif; fill: #E8FFFF; }
      .small { font: 500 18px 'Segoe UI', Roboto, Arial, sans-serif; fill: #C6F3EF; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7DE2DA" />
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#001014" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1400" height="420" fill="url(#bg)" rx="22" />

  <text x="700" y="54" text-anchor="middle" class="label">Mangrove Scan Pipeline</text>
  <text x="700" y="84" text-anchor="middle" class="small">Static diagram (no interactive controls)</text>

  <g filter="url(#shadow)">
    <rect x="60" y="130" width="170" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="145" y="175" text-anchor="middle" class="small">Open Scanner</text>

    <rect x="260" y="130" width="170" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="345" y="175" text-anchor="middle" class="small">Capture Frame</text>

    <rect x="460" y="130" width="190" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="555" y="175" text-anchor="middle" class="small">Run TFLite Inference</text>

    <rect x="680" y="130" width="210" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="785" y="175" text-anchor="middle" class="small">Compute Root/Trunk Ratio</text>

    <rect x="920" y="130" width="200" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="1020" y="175" text-anchor="middle" class="small">Assign Stability Class</text>

    <rect x="1150" y="130" width="190" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="1245" y="175" text-anchor="middle" class="small">Save Scan Locally</text>

    <rect x="980" y="280" width="190" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="1075" y="325" text-anchor="middle" class="small">Update Dashboard</text>

    <rect x="1200" y="280" width="140" height="72" rx="14" fill="url(#card)" stroke="#6EE0D7" stroke-opacity="0.45" />
    <text x="1270" y="325" text-anchor="middle" class="small">Export PDF</text>
  </g>

  <g stroke="#7DE2DA" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <line x1="230" y1="166" x2="258" y2="166" />
    <line x1="430" y1="166" x2="458" y2="166" />
    <line x1="650" y1="166" x2="678" y2="166" />
    <line x1="890" y1="166" x2="918" y2="166" />
    <line x1="1120" y1="166" x2="1148" y2="166" />

    <path d="M 1245 204 L 1245 258 L 1075 258 L 1075 278" />
    <path d="M 1245 204 L 1245 278" />
  </g>
</svg>
