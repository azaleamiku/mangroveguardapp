<svg width="1400" height="420" viewBox="0 0 1400 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mangrove Guard Scan Flow</title>
  <desc id="desc">Simple draw.io-style scan flow diagram with monochrome boxes and arrows.</desc>

  <defs>
    <style>
      .title { font: 700 22px Arial, Helvetica, sans-serif; fill: #111111; }
      .label { font: 500 18px Arial, Helvetica, sans-serif; fill: #111111; }
      .node { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .line { stroke: #111111; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111111" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="420" fill="#ffffff" />
  <text x="700" y="44" text-anchor="middle" class="title">Mangrove Scan Pipeline</text>

  <rect x="60" y="120" width="170" height="68" rx="6" class="node" />
  <text x="145" y="160" text-anchor="middle" class="label">Open Scanner</text>

  <rect x="260" y="120" width="170" height="68" rx="6" class="node" />
  <text x="345" y="160" text-anchor="middle" class="label">Capture Frame</text>

  <rect x="460" y="120" width="190" height="68" rx="6" class="node" />
  <text x="555" y="160" text-anchor="middle" class="label">Run TFLite Inference</text>

  <rect x="680" y="120" width="210" height="68" rx="6" class="node" />
  <text x="785" y="160" text-anchor="middle" class="label">Compute Ratio</text>

  <rect x="920" y="120" width="200" height="68" rx="6" class="node" />
  <text x="1020" y="160" text-anchor="middle" class="label">Assign Stability</text>

  <rect x="1150" y="120" width="190" height="68" rx="6" class="node" />
  <text x="1245" y="160" text-anchor="middle" class="label">Save Scan Locally</text>

  <rect x="980" y="270" width="190" height="68" rx="6" class="node" />
  <text x="1075" y="310" text-anchor="middle" class="label">Update Dashboard</text>

  <rect x="1200" y="270" width="140" height="68" rx="6" class="node" />
  <text x="1270" y="310" text-anchor="middle" class="label">Export PDF</text>

  <line x1="230" y1="154" x2="258" y2="154" class="line" />
  <line x1="430" y1="154" x2="458" y2="154" class="line" />
  <line x1="650" y1="154" x2="678" y2="154" class="line" />
  <line x1="890" y1="154" x2="918" y2="154" class="line" />
  <line x1="1120" y1="154" x2="1148" y2="154" class="line" />

  <path d="M 1245 188 L 1245 248 L 1075 248 L 1075 268" class="line" />
  <path d="M 1245 188 L 1245 268" class="line" />
</svg>
