<svg width="1280" height="340" viewBox="0 0 1280 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Mangrove Guard Scan Flow</title>
  <desc id="desc">Draw.io-style scan flow from scanner opening to local save, with branches to PDF export and dashboard update.</desc>

  <defs>
    <style>
      .node {
        fill: #f2f2f2;
        stroke: #111;
        stroke-width: 1.5;
        rx: 6;
      }
      .label {
        fill: #111;
        font: 500 21px Arial, Helvetica, sans-serif;
      }
      .line {
        stroke: #111;
        stroke-width: 1.6;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10 Z" fill="#111"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1280" height="340" fill="#fff"/>

  <rect class="node" x="20" y="130" width="150" height="68"/>
  <text class="label" x="95" y="171" text-anchor="middle">Open Scanner</text>

  <rect class="node" x="215" y="130" width="150" height="68"/>
  <text class="label" x="290" y="171" text-anchor="middle">Capture Frame</text>

  <rect class="node" x="410" y="130" width="155" height="68"/>
  <text class="label" x="487.5" y="162" text-anchor="middle">Run TFLite</text>
  <text class="label" x="487.5" y="184" text-anchor="middle">Inference</text>

  <rect class="node" x="610" y="130" width="170" height="68"/>
  <text class="label" x="695" y="162" text-anchor="middle">Compute Root/</text>
  <text class="label" x="695" y="184" text-anchor="middle">Trunk Ratio</text>

  <rect class="node" x="825" y="130" width="150" height="68"/>
  <text class="label" x="900" y="162" text-anchor="middle">Assign Stability</text>
  <text class="label" x="900" y="184" text-anchor="middle">Class</text>

  <rect class="node" x="1020" y="130" width="160" height="68"/>
  <text class="label" x="1100" y="171" text-anchor="middle">Save Scan Locally</text>

  <rect class="node" x="1125" y="20" width="135" height="58"/>
  <text class="label" x="1192.5" y="55" text-anchor="middle">Export PDF</text>

  <rect class="node" x="1125" y="262" width="150" height="58"/>
  <text class="label" x="1200" y="297" text-anchor="middle">Update Dashboard</text>

  <line class="line" x1="170" y1="164" x2="213" y2="164"/>
  <line class="line" x1="365" y1="164" x2="408" y2="164"/>
  <line class="line" x1="565" y1="164" x2="608" y2="164"/>
  <line class="line" x1="780" y1="164" x2="823" y2="164"/>
  <line class="line" x1="975" y1="164" x2="1018" y2="164"/>

  <path class="line" d="M1100 130 L1100 98 L1192 98 L1192 80"/>
  <path class="line" d="M1100 198 L1100 236 L1200 236 L1200 260"/>
</svg>
